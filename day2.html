<script>
  const trackerUrl = "https://script.google.com/macros/s/AKfycbwLP4Y6iHhJnzcr4Nsf6Y-m_NurQNA4Xzxdpm7-SITQfpdnJdcvg9MfKwCUvSWOViNd/exec";
  const params = new URLSearchParams(window.location.search);
  const source = params.get("source") || "unknown";

  function logVisit() {
    const pageName = "day2";
    const currentUrl = window.location.href;

    fetch(`${trackerUrl}?page=${encodeURIComponent(pageName)}&event=${encodeURIComponent("visit")}&source=${encodeURIComponent(source)}&url=${encodeURIComponent(currentUrl)}`)
      .then(response => response.text())
      .then(data => console.log("Visit logged:", data))
      .catch(error => console.log("Tracking error:", error));
  }

  function logCompletion() {
    const pageName = "day2";
    const currentUrl = window.location.href;

    fetch(`${trackerUrl}?page=${encodeURIComponent(pageName)}&event=${encodeURIComponent("complete")}&source=${encodeURIComponent(source)}&url=${encodeURIComponent(currentUrl)}`)
      .then(response => response.text())
      .then(data => console.log("Completion logged:", data))
      .catch(error => console.log("Tracking error:", error));
  }

  window.addEventListener("load", logVisit);

  function showExample() {
    document.getElementById("exampleModal").style.display = "block";
  }

  function hideExample() {
    document.getElementById("exampleModal").style.display = "none";
  }

  function checkAnswer() {
    const selected = document.querySelector('input[name="answer"]:checked');
    const correct = document.getElementById("correct");
    const incorrect = document.getElementById("incorrect");
    const ending = document.getElementById("ending");

    correct.style.display = "none";
    incorrect.style.display = "none";

    if (!selected) {
      incorrect.textContent = "❌ Select an answer first.";
      incorrect.style.display = "block";
      ending.style.display = "none";
      return;
    }

    if (selected.value === "C") {
      correct.style.display = "block";
      ending.style.display = "block";
      logCompletion();
    } else {
      incorrect.style.display = "block";
      ending.style.display = "none";
    }
  }
</script>
